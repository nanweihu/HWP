<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fate Planner Pages</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #2f261c;
      --muted: #6f624f;
      --accent: #9e6a2f;
      --accent-dark: #7f5220;
      --border: rgba(110, 86, 52, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(184, 135, 71, 0.22), transparent 36%),
        linear-gradient(160deg, #f7f1e7 0%, #efe5d5 52%, #e8dbc6 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 24px 70px rgba(65, 46, 23, 0.12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 16px;
    }

    a {
      display: block;
      padding: 18px 20px;
      border-radius: 18px;
      text-decoration: none;
      background: #fffaf3;
      border: 1px solid rgba(158, 106, 47, 0.16);
      color: var(--text);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: rgba(158, 106, 47, 0.4);
      box-shadow: 0 18px 36px rgba(95, 61, 20, 0.12);
    }

    strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
      color: var(--accent-dark);
    }

    span {
      color: var(--muted);
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fate Planner Pages</h1>
    <p>这个仓库已发布两个可直接访问的 HTML 页面。点击下面任一入口即可打开。</p>
    <ul>
      <li>
        <a href="./保险利益演示.html">
          <strong>缴清增额养老金分红保险 · 利益演示</strong>
          <span>./保险利益演示.html</span>
        </a>
      </li>
      <li>
        <a href="./泰康岁月有约2026_许黛专属计划书.html">
          <strong>泰康岁月有约2026 · 许黛女士专属计划书</strong>
          <span>./泰康岁月有约2026_许黛专属计划书.html</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
