<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HWP Pages</title>
  <style>
    :root {
      --bg-1: #f6f1e7;
      --bg-2: #eadbc4;
      --panel: rgba(255, 252, 246, 0.9);
      --text: #2d241a;
      --muted: #6e624f;
      --accent: #8a5a24;
      --border: rgba(138, 90, 36, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(183, 134, 68, 0.28), transparent 35%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }

    main {
      width: min(760px, 100%);
      padding: 36px 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(74, 50, 20, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 16px;
    }

    a {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fffaf3;
      border: 1px solid rgba(138, 90, 36, 0.16);
      border-radius: 18px;
      padding: 18px 20px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: rgba(138, 90, 36, 0.36);
      box-shadow: 0 16px 36px rgba(74, 50, 20, 0.12);
    }

    strong {
      display: block;
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 6px;
    }

    span {
      font-size: 14px;
      color: var(--muted);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>HWP Pages</h1>
    <p>仓库中已发布两个可直接访问的 HTML 页面。点击下面入口即可打开。</p>
    <ul>
      <li>
        <a href="./保险利益演示.html">
          <strong>缴清增额养老金分红保险 · 利益演示</strong>
          <span>./保险利益演示.html</span>
        </a>
      </li>
      <li>
        <a href="./泰康岁月有约2026_许黛专属计划书.html">
          <strong>泰康岁月有约2026 · 许黛女士专属计划书</strong>
          <span>./泰康岁月有约2026_许黛专属计划书.html</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
